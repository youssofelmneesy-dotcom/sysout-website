<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 
    <!-- Prevent Google Chrome auto-translate popup -->
    <meta name="google" content="notranslate" />
 
    <!-- Primary SEO -->
    <title>
      SysOut | Digital Solutions, Web Development, Mobile Apps & Business Systems
    </title>
 
    <!-- Structured data (must be inside a script tag, otherwise the browser
         renders it as visible text at the top of the page) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SysOut"
    }
    </script>
 
    <meta
      name="description"
      content="SysOut helps businesses grow through modern digital solutions including websites, mobile applications, business systems, automation, branding, UI/UX design, and digital marketing."
    />
 
    <meta
      name="keywords"
      content="SysOut, Digital Solutions, Web Development, Website Development, Mobile App Development, Business Systems, Software Development, UI UX Design, Branding, Digital Marketing, Automation,Data Analysis, Programming, Egypt"
    />
 
    <meta name="author" content="SysOut" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
 
    <!-- Canonical -->
    <link rel="canonical" href="https://sysoutdigital.tech/" />
 
    <!-- Theme -->
    <meta name="theme-color" content="#6D28D9" />
 
    <!-- Open Graph (Facebook, LinkedIn, Discord...) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SysOut" />
    <meta
      property="og:title"
      content="SysOut | Digital Solutions for Growing Businesses"
    />
    <meta
      property="og:description"
      content="We help businesses build, improve, and grow through websites, mobile apps, software, branding, automation, and digital marketing."
    />
    <meta property="og:url" content="https://sysoutdigital.tech/" />
    <meta
      property="og:image"
      content="https://sysoutdigital.tech/og-image.png"
    />
 
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="SysOut | Digital Solutions for Growing Businesses"
    />
    <meta
      name="twitter:description"
      content="Helping businesses grow through modern digital solutions."
    />
    <meta
      name="twitter:image"
      content="https://sysoutdigital.tech/og-image.png"
    />
 
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
 
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
 
  <body>
    <div id="root"></div>
 
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
